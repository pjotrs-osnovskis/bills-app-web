name: Bootstrap Deploy IAM

on:
  workflow_dispatch:

jobs:
  grant:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set project
        run: gcloud config set project bills-app-52127

      - name: Grant required roles
        run: |
          MEMBER="serviceAccount:firebase-adminsdk-fbsvc@bills-app-52127.iam.gserviceaccount.com"
          PROJECT="bills-app-52127"
          gcloud projects add-iam-policy-binding "$PROJECT" --member="$MEMBER" --role="roles/run.admin"
          gcloud projects add-iam-policy-binding "$PROJECT" --member="$MEMBER" --role="roles/iam.serviceAccountUser"
          gcloud projects add-iam-policy-binding "$PROJECT" --member="$MEMBER" --role="roles/cloudbuild.builds.editor"
          gcloud projects add-iam-policy-binding "$PROJECT" --member="$MEMBER" --role="roles/artifactregistry.writer"
